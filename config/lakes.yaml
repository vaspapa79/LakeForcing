# Lake registry for the global forcing dataset.
# `bathy` = source of bed elevation; `status` tracks build progress.
# Prototype lake reuses an existing Delft3D model; the rest are built from
# global open inputs (HydroLAKES polygon + GLOBathy bathymetry + ERA5 wind).

defaults:
  era5_variables: [10m_u_component_of_wind, 10m_v_component_of_wind,
                   2m_temperature, surface_solar_radiation_downwards,
                   mean_sea_level_pressure]
  wave_model: SWAN            # via Delft3D-WAVE, stationary, wind-forced
  output_crs: EPSG:4326       # CF NetCDF written in lon/lat for OpenDrift

lakes:

  # ---- Prototype (existing Delft3D model) ----
  polyfytos:
    name: Lake Polyfytos (Aliakmonas reservoir)
    country: Greece
    centroid: {lon: 21.95, lat: 40.20}
    type: reservoir
    regime: shallow-to-moderate, managed, fetch-driven
    crs: EPSG:32634
    model_dir: "C:/Users/vaspapa/Desktop/Greek_lakes/Lake Polyfytos"
    model_prefix: polifitos
    bathy: existing (xyz survey, UTM-34N)
    status: prototype-in-progress   # add waves + CF export + OpenDrift demo

  # ---- Mediterranean anchor (existing assets) ----
  trichonida:
    name: Lake Trichonida
    country: Greece
    centroid: {lon: 21.55, lat: 38.57}
    type: natural-karstic
    regime: deep, oligotrophic, low amplitude
    bathy: EKBY survey (existing)
    status: planned

  # ---- Global diversity set (build from HydroLAKES + GLOBathy + ERA5) ----
  erie:
    name: Lake Erie
    country: USA/Canada
    centroid: {lon: -81.2, lat: 42.2}
    type: great-lake
    regime: large, temperate, strong wind waves
    bathy: GLOBathy
    status: planned
  victoria:
    name: Lake Victoria
    country: Tanzania/Uganda/Kenya
    centroid: {lon: 33.0, lat: -1.0}
    type: great-lake
    regime: tropical, large fetch
    bathy: GLOBathy
    status: planned
  geneva:
    name: Lake Geneva (Léman)
    country: Switzerland/France
    centroid: {lon: 6.55, lat: 46.45}
    type: peri-alpine
    regime: deep, elongated, alpine winds
    bathy: GLOBathy
    status: planned
  balaton:
    name: Lake Balaton
    country: Hungary
    centroid: {lon: 17.7, lat: 46.83}
    type: shallow lowland
    regime: very shallow, strongly fetch-driven waves
    bathy: GLOBathy
    status: planned
  great_salt_lake:
    name: Great Salt Lake
    country: USA
    centroid: {lon: -112.5, lat: 41.1}
    type: endorheic saline
    regime: shallow, hypersaline, large area
    bathy: GLOBathy
    status: planned
  titicaca:
    name: Lake Titicaca
    country: Peru/Bolivia
    centroid: {lon: -69.3, lat: -15.8}
    type: high-altitude
    regime: 3800 m a.s.l., deep, large
    bathy: GLOBathy
    status: planned

