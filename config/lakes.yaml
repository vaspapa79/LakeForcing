gebco:
  baikal:   {name: Lake Baikal,   country: Russia,    lon: 106.9, lat: 53.5, deepest_bed_m: -1198, note: deepest lake on Earth}
  superior: {name: Lake Superior, country: USA/Canada, lon: -87.5, lat: 47.7, deepest_bed_m: -326,  note: largest freshwater lake by area}
